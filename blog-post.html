<body>
  <div data-include="nav"></div>

  <main id="main">
    <section class="post-header" id="post-header" aria-labelledby="post-title">
      <div class="container post-header__inner">
        <p class="post-header__meta" id="post-meta"></p>
        <h1 id="post-title">Loading&hellip;</h1>
      </div>
    </section>

    <section class="post-body">
      <div class="container">
        <a class="post-back" href="blog.html">← All Articles</a>
        <div class="post-content" id="post-content">
          <p class="post-loading">Loading article&hellip;</p>
        </div>
      </div>
    </section>
  </main>

  <div data-include="footer"></div>

  <script>
    (() => {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('post');
      const contentEl = document.getElementById('post-content');
      const titleEl = document.getElementById('post-title');
      const metaEl = document.getElementById('post-meta');

      if (!slug) {
        contentEl.innerHTML = '<p class="post-error">No article specified.</p>';
        titleEl.textContent = 'Article Not Found';
        return;
      }

      fetch(`/blog/${slug}.md`)
        .then(res => {
          if (!res.ok) throw new Error('Not found');
          return res.text();
        })
        .then(md => {
          const lines = md.split('\n');
          let title = '';
          let metaLine = '';
          let bodyStart = 0;

          for (let i = 0; i < lines.length; i++) {
            if (lines[i].startsWith('# ') && !title) {
              title = lines[i].replace(/^# /, '').trim();
              bodyStart = i + 1;
            } else if (lines[i].startsWith('**By ') && !metaLine) {
              metaLine = lines[i].replace(/\*\*/g, '').trim();
              bodyStart = i + 1;
            } else if (title && metaLine) {
              bodyStart = i;
              break;
            }
          }

          const body = lines.slice(bodyStart).join('\n');

          document.title = `${title} | Tree Web Design`;
          titleEl.textContent = title || 'Article';
          metaEl.textContent = metaLine || '';
          contentEl.innerHTML = marked.parse(body);
        })
        .catch(() => {
          contentEl.innerHTML = '<p class="post-error">Article not found. <a href="blog.html">Back to all articles.</a></p>';
          titleEl.textContent = 'Article Not Found';
        });
    })();
  </script>
</body>
